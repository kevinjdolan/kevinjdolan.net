services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv
    command: >
      sh -c "uv sync --frozen &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: "http://backend:8000"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-venv:
  frontend-node-modules:
